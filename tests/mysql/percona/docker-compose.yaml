services:
  master:
    image: percona:ps-8.0
    restart: unless-stopped
    ports:
      - "9150:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=password
    volumes:
      - ./master_init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command:
      - --server-id=1
      - --log-bin=mysql-bin
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
    healthcheck:
      test: ["CMD", "mysql", "-urepl", "-prepl_password", "-e", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  slave:
    image: percona:ps-8.0
    restart: unless-stopped
    depends_on:
      master:
        condition: service_healthy
    ports:
      - "9151:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=password
    volumes:
      - ./slave_init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command:
      - --server-id=2
      - --relay-log=relay-bin
      - --read-only=1
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
